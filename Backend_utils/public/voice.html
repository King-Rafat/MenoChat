<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>মেনো ভয়েস</title>
<style>
  /* ===== Warm, friendly light palette ===== */
  :root {
    --bg:           #fff8ef;   /* soft cream */
    --bg-soft:      #fbeedb;   /* slightly deeper cream */
    --panel:        #ffffff;   /* clean white surfaces */
    --fg:           #2d3748;   /* warm dark slate text */
    --fg-soft:      #4a5568;
    --muted:        #94a3b8;

    --idle:         #a78bfa;   /* soft lavender */
    --idle-glow:    rgba(167, 139, 250, 0.45);
    --listening:    #fb7185;   /* coral pink */
    --listening-glow: rgba(251, 113, 133, 0.45);
    --thinking:     #94a3b8;   /* soft slate */
    --speaking:     #60a5fa;   /* soft sky */
    --speaking-glow: rgba(96, 165, 250, 0.45);

    --user-bg:      #fce7f3;   /* light pink */
    --user-fg:      #7a1f4d;
    --bot-bg:       #e0f2fe;   /* light sky */
    --bot-fg:       #1e3a5f;
    --warn-bg:      #fef3c7;   /* light amber */
    --warn-border:  #f59e0b;
    --warn-fg:      #783c0f;
    --error:        #ef4444;
    --error-bg:     #fee2e2;

    --shadow-sm:    0 2px 8px  rgba(60, 40, 20, 0.06);
    --shadow:       0 8px 24px rgba(60, 40, 20, 0.08);
    --shadow-lg:    0 20px 48px rgba(60, 40, 20, 0.12);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--fg);
    height: 100%;
    font-family: "Hind Siliguri", "Noto Sans Bengali", system-ui, -apple-system, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .view { display: none; }
  .view.active {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    padding: 40px;
  }

  h1 { margin: 0; font-weight: 700; }

  /* ===== Login card ===== */
  .login-card {
    background: var(--panel);
    padding: 44px 40px;
    border-radius: 24px;
    width: 420px;
    max-width: 92vw;
    box-shadow: var(--shadow-lg);
  }
  .login-card h1 {
    text-align: center;
    margin-bottom: 28px;
    font-size: 34px;
    color: var(--fg);
  }
  .login-card input {
    width: 100%;
    padding: 14px 18px;
    font-size: 17px;
    border-radius: 12px;
    border: 2px solid #ecdec4;
    background: #fffaf2;
    color: var(--fg);
    margin-bottom: 14px;
    outline: none;
    font-family: inherit;
    transition: border-color 0.18s, background 0.18s;
  }
  .login-card input:focus {
    border-color: var(--idle);
    background: #fff;
  }
  .login-card button.primary {
    width: 100%;
    padding: 14px 18px;
    font-size: 18px;
    border-radius: 12px;
    border: none;
    background: var(--idle);
    color: #fff;
    cursor: pointer;
    font-family: inherit;
    font-weight: 700;
    margin-top: 12px;
    transition: filter 0.15s ease, transform 0.05s;
    box-shadow: 0 6px 18px var(--idle-glow);
  }
  .login-card button.primary:hover { filter: brightness(1.05); }
  .login-card button.primary:active { transform: scale(0.98); }
  .login-card .err {
    color: var(--error);
    font-size: 15px;
    min-height: 22px;
    text-align: center;
    margin-top: 12px;
  }

  /* ===== Voice view (idle: centered, button big) ===== */
  #voice-view {
    width: 100%;
    height: 100vh;
    padding: 40px;
    gap: 28px;
    transition: padding 0.4s ease;
  }
  #status {
    font-size: 44px;
    font-weight: 700;
    color: var(--fg);
    min-height: 54px;
    margin: 0;
    text-align: center;
    letter-spacing: 0.3px;
  }
  #subtle {
    color: var(--muted);
    font-size: 20px;
    min-height: 26px;
    text-align: center;
  }

  /* ===== Big circular talk button ===== */
  #talk-btn {
    width: 260px;
    height: 260px;
    border-radius: 50%;
    border: none;
    color: #fff;
    font-size: 28px;
    font-weight: 700;
    cursor: pointer;
    background: var(--idle);
    box-shadow: 0 14px 40px var(--idle-glow);
    transition:
      background 0.25s ease,
      transform 0.45s cubic-bezier(.2,.7,.2,1),
      width 0.45s ease,
      height 0.45s ease,
      font-size 0.45s ease,
      bottom 0.45s ease,
      left 0.45s ease,
      box-shadow 0.3s ease;
    font-family: inherit;
    outline: none;
    position: relative;
    z-index: 5;
  }
  #talk-btn:active { transform: scale(0.97); }

  #talk-btn.listening {
    background: var(--listening);
    animation: pulse-red 1.2s ease-in-out infinite;
  }
  #talk-btn.thinking { background: var(--thinking); }
  #talk-btn.thinking::after {
    content: "";
    position: absolute;
    top: 50%; left: 50%;
    width: 44px; height: 44px;
    margin: -22px 0 0 -22px;
    border: 4px solid rgba(255,255,255,0.32);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  #talk-btn.thinking .label { opacity: 0.3; }
  #talk-btn.speaking { background: var(--speaking); }

  @keyframes pulse-red {
    0%, 100% { box-shadow: 0 14px 40px var(--listening-glow); }
    50%      { box-shadow: 0 14px 70px rgba(251, 113, 133, 0.95); }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ===== When in session: button shrinks to bottom-LEFT, log fills ===== */
  #voice-view.in-session {
    padding: 28px 32px;
    gap: 18px;
  }
  #voice-view.in-session #talk-btn {
    position: fixed;
    width: 110px;
    height: 110px;
    bottom: 28px;
    left: 28px;
    font-size: 16px;
    box-shadow: 0 8px 22px rgba(60, 40, 20, 0.18);
  }
  #voice-view.in-session #talk-btn.thinking::after {
    width: 28px;
    height: 28px;
    margin: -14px 0 0 -14px;
    border-width: 3px;
  }
  #voice-view.in-session #status {
    font-size: 32px;
    min-height: 40px;
  }
  #voice-view.in-session #subtle {
    font-size: 18px;
  }

  /* ===== Chat log + bubbles ===== */
  #log {
    width: min(820px, 92vw);
    max-height: 280px;
    overflow-y: auto;
    background: var(--panel);
    border-radius: 22px;
    padding: 24px 26px;
    color: var(--fg);
    box-shadow: var(--shadow);
    transition:
      max-height 0.45s ease,
      height 0.45s ease,
      font-size 0.3s ease,
      padding 0.3s ease;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  #voice-view.in-session #log {
    width: min(1100px, 95vw);
    max-height: calc(100vh - 230px);
    height: calc(100vh - 230px);
    padding: 28px 32px;
  }

  .bubble {
    padding: 14px 20px;
    border-radius: 18px;
    max-width: 80%;
    word-wrap: break-word;
    white-space: pre-wrap;
    font-size: 19px;
    line-height: 1.65;
    box-shadow: var(--shadow-sm);
  }
  #voice-view.in-session .bubble {
    font-size: 22px;
    line-height: 1.75;
    padding: 16px 22px;
  }
  .bubble .who {
    display: block;
    font-size: 0.7em;
    font-weight: 700;
    opacity: 0.75;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
    text-transform: uppercase;
  }

  .bubble.me {
    background: var(--user-bg);
    color: var(--user-fg);
    align-self: flex-end;
    border-bottom-right-radius: 6px;
  }
  .bubble.bot {
    background: var(--bot-bg);
    color: var(--bot-fg);
    align-self: flex-start;
    border-bottom-left-radius: 6px;
  }
  .bubble.warn {
    background: var(--warn-bg);
    color: var(--warn-fg);
    border-left: 6px solid var(--warn-border);
    align-self: stretch;
    max-width: 100%;
    border-radius: 14px;
    font-weight: 500;
  }
  .bubble.err {
    background: var(--error-bg);
    color: var(--error);
    border-left: 6px solid var(--error);
    align-self: stretch;
    max-width: 100%;
    border-radius: 14px;
  }
  .meta {
    color: var(--muted);
    font-size: 14px;
    align-self: center;
    font-style: italic;
  }

  /* ===== Logout ===== */
  #logout {
    background: var(--panel);
    border: 1.5px solid #ecdec4;
    color: var(--muted);
    padding: 10px 22px;
    border-radius: 12px;
    cursor: pointer;
    font-family: inherit;
    font-size: 15px;
    transition: all 0.15s ease;
    box-shadow: var(--shadow-sm);
  }
  #logout:hover {
    color: var(--fg);
    border-color: var(--idle);
  }
  #voice-view.in-session #logout {
    position: fixed;
    top: 22px;
    right: 22px;
    z-index: 6;
  }

  /* ===== Avatar (bottom-right corner) ===== */
  #avatar {
    position: fixed;
    right: 24px;
    bottom: 24px;
    width: 140px;
    height: 140px;
    pointer-events: none;
    user-select: none;
    z-index: 10;
    filter: drop-shadow(0 8px 16px rgba(60,40,20,0.15));
  }
  #avatar img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    transition: opacity 0.06s linear;
  }
  #mouth-closed { opacity: 1; }
  #mouth-open   { opacity: 0; }
</style>
</head>
<body>

<!-- LOGIN VIEW -->
<div id="login-view" class="view active">
  <div class="login-card">
    <h1>মেনো ভয়েস</h1>
    <input type="text" id="username" placeholder="ইউজারনেম" autocomplete="username">
    <input type="password" id="password" placeholder="পাসওয়ার্ড" autocomplete="current-password">
    <button class="primary" id="login-btn">লগইন</button>
    <div id="login-error" class="err"></div>
  </div>
</div>

<!-- VOICE VIEW -->
<div id="voice-view" class="view">
  <h1 id="status">চাপুন এবং বলুন</h1>
  <div id="subtle"></div>
  <button id="talk-btn"><span class="label">শুরু</span></button>
  <div id="log"></div>
  <button id="logout">লগআউট</button>
</div>

<!-- AVATAR (always present, never re-rendered) -->
<div id="avatar">
  <img id="mouth-closed" src="/static/mouth_closed.png" alt="">
  <img id="mouth-open"   src="/static/mouth_open.png"   alt="">
</div>

<script>
"use strict";

// ---------------------------------------------------------------------------
// Globals
// ---------------------------------------------------------------------------
const STATUS_TEXT = {
  idle:      "চাপুন এবং বলুন",
  listening: "শুনছি",
  thinking:  "ভাবছি",
  speaking:  "উত্তর দিচ্ছি",
};

let token = localStorage.getItem("meno_token") || "";
let ws = null;
let audioCtx = null;
let analyser = null;
let micStream = null;
let micSource = null;
let workletNode = null;
let nextStartTime = 0;
let sessionActive = false;
let currentState = "idle";   // idle | listening | thinking | speaking
let answerBuffer = "";       // streamed answer tokens
let lastBotText = "";        // text we last logged as a bot bubble (no warnings)

const loginView   = document.getElementById("login-view");
const voiceView   = document.getElementById("voice-view");
const usernameEl  = document.getElementById("username");
const passwordEl  = document.getElementById("password");
const loginErrEl  = document.getElementById("login-error");
const loginBtn    = document.getElementById("login-btn");
const talkBtn     = document.getElementById("talk-btn");
const talkLabel   = talkBtn.querySelector(".label");
const statusEl    = document.getElementById("status");
const subtleEl    = document.getElementById("subtle");
const logEl       = document.getElementById("log");
const logoutBtn   = document.getElementById("logout");
const mouthOpen   = document.getElementById("mouth-open");
const mouthClosed = document.getElementById("mouth-closed");

// ---------------------------------------------------------------------------
// Boot
// ---------------------------------------------------------------------------
if (token) {
  showVoiceView();
} else {
  showLoginView();
}

loginBtn.addEventListener("click", doLogin);
passwordEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter") doLogin();
});
logoutBtn.addEventListener("click", () => {
  if (sessionActive) stopSession();
  localStorage.removeItem("meno_token");
  token = "";
  showLoginView();
});
talkBtn.addEventListener("click", onTalkBtnClick);

// ---------------------------------------------------------------------------
// Auth
// ---------------------------------------------------------------------------
async function doLogin() {
  const username = usernameEl.value.trim();
  const password = passwordEl.value;
  if (!username || !password) {
    loginErrEl.textContent = "ইউজারনেম এবং পাসওয়ার্ড দিন";
    return;
  }
  loginErrEl.textContent = "";
  loginBtn.disabled = true;
  try {
    const res = await fetch("/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password }),
    });
    if (!res.ok) {
      loginErrEl.textContent = "লগইন ব্যর্থ হয়েছে";
      return;
    }
    const data = await res.json();
    token = data.access_token || "";
    if (!token) {
      loginErrEl.textContent = "টোকেন পাওয়া যায়নি";
      return;
    }
    localStorage.setItem("meno_token", token);
    showVoiceView();
  } catch (e) {
    loginErrEl.textContent = "নেটওয়ার্ক সমস্যা";
  } finally {
    loginBtn.disabled = false;
  }
}

function showLoginView() {
  voiceView.classList.remove("active");
  loginView.classList.add("active");
  passwordEl.value = "";
}

function showVoiceView() {
  loginView.classList.remove("active");
  voiceView.classList.add("active");
  setState("idle");
}

// ---------------------------------------------------------------------------
// Talk button
// ---------------------------------------------------------------------------
async function onTalkBtnClick() {
  if (!sessionActive) {
    sessionActive = true;
    talkBtn.disabled = true;
    try {
      await startSession();
    } catch (e) {
      logErr("শুরু করা যায়নি: " + e.message);
      sessionActive = false;
      setState("idle");
    } finally {
      talkBtn.disabled = false;
    }
  } else {
    stopSession();
  }
}

// ---------------------------------------------------------------------------
// Audio engine
// ---------------------------------------------------------------------------
async function startSession() {
  micStream = await navigator.mediaDevices.getUserMedia({
    audio: {
      channelCount: 1,
      sampleRate: 48000,
      echoCancellation: true,
      noiseSuppression: true,
      autoGainControl: true,
    },
  });

  audioCtx = new (window.AudioContext || window.webkitAudioContext)({
    sampleRate: 48000,
  });
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 1024;
  analyser.smoothingTimeConstant = 0.7;
  analyser.connect(audioCtx.destination);

  const workletCode = `
    class PCMProcessor extends AudioWorkletProcessor {
      constructor() {
        super();
        this.parts = [];
        this.partsLen = 0;
        this.targetLen = 2400; // ~50 ms @ 48 kHz
      }
      process(inputs) {
        const input = inputs[0];
        if (!input || input.length === 0) return true;
        const ch = input[0];
        if (!ch) return true;
        this.parts.push(new Float32Array(ch));
        this.partsLen += ch.length;
        if (this.partsLen >= this.targetLen) {
          const out = new Int16Array(this.partsLen);
          let off = 0;
          for (const part of this.parts) {
            for (let i = 0; i < part.length; i++) {
              let s = part[i];
              if (s > 1) s = 1; else if (s < -1) s = -1;
              out[off++] = s < 0 ? s * 0x8000 : s * 0x7FFF;
            }
          }
          this.port.postMessage(out.buffer, [out.buffer]);
          this.parts = [];
          this.partsLen = 0;
        }
        return true;
      }
    }
    registerProcessor('pcm-processor', PCMProcessor);
  `;
  const blob = new Blob([workletCode], { type: "application/javascript" });
  const blobUrl = URL.createObjectURL(blob);
  await audioCtx.audioWorklet.addModule(blobUrl);

  micSource = audioCtx.createMediaStreamSource(micStream);
  workletNode = new AudioWorkletNode(audioCtx, "pcm-processor");
  micSource.connect(workletNode);

  workletNode.port.onmessage = (ev) => {
    if (currentState !== "listening") return;
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(ev.data);
  };

  const wsProto = location.protocol === "https:" ? "wss:" : "ws:";
  const wsUrl = `${wsProto}//${location.host}/ws/voice?token=${encodeURIComponent(token)}`;
  ws = new WebSocket(wsUrl);
  ws.binaryType = "arraybuffer";

  ws.addEventListener("open", () => {
    ws.send(JSON.stringify({
      type: "config",
      sample_rate: audioCtx.sampleRate,
    }));
  });
  ws.addEventListener("message", handleWsMessage);
  ws.addEventListener("close", () => {
    if (sessionActive) stopSession();
  });
  ws.addEventListener("error", () => {
    logErr("কানেকশন সমস্যা");
  });

  startAvatarLoop();
  voiceView.classList.add("in-session");

  setState("listening");
  logMeta("সংযোগ চালু হলো");
}

function stopSession() {
  sessionActive = false;
  try { workletNode && workletNode.disconnect(); } catch (e) {}
  workletNode = null;
  try { micSource && micSource.disconnect(); } catch (e) {}
  micSource = null;
  if (micStream) {
    micStream.getTracks().forEach((t) => t.stop());
    micStream = null;
  }
  if (ws) {
    try { ws.send(JSON.stringify({ type: "end_session" })); } catch (e) {}
    try { ws.close(); } catch (e) {}
    ws = null;
  }
  if (audioCtx) {
    try { audioCtx.close(); } catch (e) {}
    audioCtx = null;
  }
  analyser = null;
  nextStartTime = 0;
  voiceView.classList.remove("in-session");
  setState("idle");
  logMeta("সেশন শেষ");
}

// ---------------------------------------------------------------------------
// WebSocket message handling
// ---------------------------------------------------------------------------
function handleWsMessage(ev) {
  if (ev.data instanceof ArrayBuffer) {
    queueTtsChunk(ev.data);
    return;
  }
  let msg;
  try { msg = JSON.parse(ev.data); } catch (e) { return; }
  switch (msg.type) {
    case "ready":
      logMeta(`সংযুক্ত (conv #${msg.conversation_id})`);
      break;
    case "config_ack":
      break;

    case "asr_start":
    case "planner_start":
    case "retrieval_start":
    case "answer_start":
      setState("thinking");
      if (msg.type === "asr_start")        setSubtle("কথা বুঝছি");
      if (msg.type === "planner_start")    setSubtle("প্রশ্ন বুঝছি");
      if (msg.type === "retrieval_start")  setSubtle("তথ্য খুঁজছি");
      if (msg.type === "answer_start")     setSubtle("উত্তর লিখছি");
      break;

    case "transcription":
      if (msg.text) logUser(msg.text);
      break;

    case "answer_token":
      // Live token stream from the responder. Buffered silently;
      // we render it as a single bubble at answer_done.
      answerBuffer += msg.text || "";
      break;

    case "planner_done":
    case "retrieval_done":
      break;

    case "answer_done":
      // Show the streamed answer immediately as a bot bubble.
      if (answerBuffer.trim()) {
        lastBotText = answerBuffer.trim();
        logBot(lastBotText);
      }
      setSubtle("");
      break;

    case "comorbidity_start":
      setSubtle("খাবার যাচাই");
      break;
    case "comorbidity_done":
      setSubtle("");
      break;

    case "final_answer":
      // The server already sent us the streamed answer (rendered at
      // answer_done) and will send `comorbidity_warning` separately if
      // there are warnings. Here we just back-fill in the rare case
      // where no streamed text reached the UI.
      if (msg.text && !lastBotText) {
        logBot(msg.text.trim());
      }
      answerBuffer = "";
      lastBotText = "";
      break;

    case "comorbidity_warning":
      // Dedicated amber alert bubble for food/disease warnings. The
      // server pre-computes the warning text and sends it as a separate
      // event, so the UI doesn't have to do any diffing.
      if (msg.text && msg.text.trim()) {
        logWarn(msg.text.trim());
      }
      break;

    case "tts_start":
      setState("speaking");
      setSubtle("");
      break;

    case "tts_chunk_done":
      break;

    case "turn_done":
      if (sessionActive) {
        setState("listening");
        setSubtle("");
      }
      break;

    case "error":
      logErr(`ত্রুটি (${msg.phase || "?"}): ${msg.error || ""}`);
      if (sessionActive) setState("listening");
      break;
  }
}

// ---------------------------------------------------------------------------
// TTS playback queue
// ---------------------------------------------------------------------------
async function queueTtsChunk(arrayBuffer) {
  if (!audioCtx) return;
  try {
    const buf = await audioCtx.decodeAudioData(arrayBuffer.slice(0));
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    src.connect(analyser);
    const startAt = Math.max(audioCtx.currentTime + 0.02, nextStartTime);
    src.start(startAt);
    nextStartTime = startAt + buf.duration;
  } catch (e) {
    console.error("decodeAudioData failed", e);
  }
}

// ---------------------------------------------------------------------------
// Avatar animation loop. One stagnant DOM node, never re-rendered.
// ---------------------------------------------------------------------------
function startAvatarLoop() {
  const data = new Uint8Array(analyser.fftSize);

  function tick() {
    if (!analyser) return;
    analyser.getByteTimeDomainData(data);
    let sum = 0;
    for (let i = 0; i < data.length; i++) {
      const v = (data[i] - 128) / 128;
      sum += v * v;
    }
    const rms = Math.sqrt(sum / data.length);

    if (currentState === "speaking" && rms > 0.04) {
      mouthOpen.style.opacity = "1";
      mouthClosed.style.opacity = "0";
    } else {
      mouthOpen.style.opacity = "0";
      mouthClosed.style.opacity = "1";
    }

    if (currentState === "speaking") {
      const glow = Math.min(rms * 4, 1);
      talkBtn.style.boxShadow =
        `0 12px ${30 + glow * 60}px rgba(96, 165, 250, ${0.45 + glow * 0.5})`;
    } else if (currentState === "idle") {
      talkBtn.style.boxShadow = "";
    } else if (currentState === "thinking") {
      talkBtn.style.boxShadow = "0 8px 22px rgba(148, 163, 184, 0.45)";
    } else {
      talkBtn.style.boxShadow = "";
    }

    requestAnimationFrame(tick);
  }
  tick();
}

// ---------------------------------------------------------------------------
// State + UI helpers
// ---------------------------------------------------------------------------
function setState(s) {
  currentState = s;
  talkBtn.classList.remove("listening", "thinking", "speaking");
  if (s === "listening")      talkBtn.classList.add("listening");
  else if (s === "thinking")  talkBtn.classList.add("thinking");
  else if (s === "speaking")  talkBtn.classList.add("speaking");

  statusEl.textContent = STATUS_TEXT[s] || "";
  if (s === "idle") {
    talkLabel.textContent = "শুরু";
    setSubtle("");
  } else {
    talkLabel.textContent = "থামান";
  }
}

function setSubtle(t) { subtleEl.textContent = t || ""; }

function logUser(t)   { return appendBubble("me",   "আপনি", t); }
function logBot(t)    { return appendBubble("bot",  "মেনো", t); }
function logWarn(t)   { return appendBubble("warn", "⚠️ গুরুত্বপূর্ণ তথ্য", t); }
function logErr(t)    { return appendBubble("err",  "ত্রুটি", t); }
function logMeta(t) {
  const div = document.createElement("div");
  div.className = "meta";
  div.textContent = t;
  logEl.appendChild(div);
  logEl.scrollTop = logEl.scrollHeight;
  return div;
}

function appendBubble(cls, who, body) {
  const wrap = document.createElement("div");
  wrap.className = "bubble " + cls;

  const header = document.createElement("span");
  header.className = "who";
  header.textContent = who;
  wrap.appendChild(header);

  const text = document.createElement("span");
  text.textContent = body;
  wrap.appendChild(text);

  logEl.appendChild(wrap);
  logEl.scrollTop = logEl.scrollHeight;
  return wrap;
}
</script>
