<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Step Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Georgia', serif;
            color: white;
        }

        .hero {
            position: relative;
            height: 100vh;
            background: url('/static/images/purple.jpg') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            /* justify-content: center; */
            align-items: center;
            padding: 3rem;
            overflow: hidden;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(24, 15, 32, 0.7);
            z-index: 1;
        }

        .identifier-section {
            position: relative;
            z-index: 2;
            background-color: rgba(255, 255, 255, 0.1);
            padding: 40px 30px;
            border-radius: 12px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            color: white;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }

        .identifier-section h2,
        .identifier-section h3 {
            font-size: 2rem;
            margin-bottom: 20px;
            font-weight: 700;
            color: #ffffff;
        }

        .identifier-section select {
            width: 80%;
            padding: 12px 15px;
            font-size: 1rem;
            border-radius: 8px;
            border: 1px solid #ccc;
            background-color: #f4f4f4;
            color: #333;
            margin-bottom: 30px;
        }

        #downloadBtn {
            display: none;
            padding: 10px 20px;
            margin-top: 20px;
            font-size: 1rem;
            background-color: #6a0dad;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        #downloadBtn:hover {
            background-color: #5c019e;
        }

        .summary-box {
            margin-top: 20px;
            padding: 10px;
            background-color: #f0f0f0;
            border-left: 5px solid #333;
            color: #000;
            text-align: left;
        }

        #stepResults > div {
            background-color: #fff;
            color: #000;
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 10px;
            text-align: left;
            overflow-x: auto;
        }

        pre {
            white-space: pre-wrap;
            word-break: break-word;
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="overlay"></div>

        <div class="identifier-section">
            <h2>Select a User Identifier</h2>
            <select id="identifierDropdown" onchange="fetchSteps()">
                <option value="">-- Select Identifier --</option>
            </select>

            <h3>User Message Steps</h3>
            <div id="stepResults"></div>
            <div id="summaryDiv"></div>
            <button id="downloadBtn">Download PDF</button>
        </div>
    </div>

    <script>
        async function fetchIdentifiers() {
            try {
                const res = await fetch('/identifiers');
                const data = await res.json();
                const dropdown = document.getElementById('identifierDropdown');

                data.forEach(id => {
                    const option = document.createElement('option');
                    option.value = id;
                    option.textContent = id;
                    dropdown.appendChild(option);
                });
            } catch (err) {
                console.error('Error fetching identifiers:', err);
            }
        }

        async function fetchSteps() {
            const identifier = document.getElementById('identifierDropdown').value;
            if (!identifier) return;

            try {
                const res = await fetch(`/steps/${identifier}`);
                const data = await res.json();

                const step = data.step_list;
                const summary = data.summary;
                const url = data.url;
                const filename = data.filename;

                const resultsDiv = document.getElementById('stepResults');
                const summaryDiv = document.getElementById('summaryDiv');
                const downloadBtn = document.getElementById('downloadBtn');

                resultsDiv.innerHTML = '';
                summaryDiv.innerHTML = '';
                downloadBtn.style.display = 'none';

                if (!step || step.length === 0) {
                    resultsDiv.innerHTML = '<p>No steps found for this user.</p>';
                } else {
                    step.forEach(stepItem => {
                        const div = document.createElement('div');
                        div.innerHTML = `<pre>${JSON.stringify(stepItem, null, 2)}</pre>`;
                        resultsDiv.appendChild(div);
                    });

                    if (summary) {
                        const summaryBox = document.createElement('div');
                        summaryBox.className = 'summary-box';
                        summaryBox.innerText = summary;
                        summaryDiv.appendChild(summaryBox);
                    }

                    downloadBtn.style.display = 'inline-block';
                    downloadBtn.onclick = () => {
                        const a = document.createElement('a');
                        a.href = window.location.origin + url;
                        a.download = filename;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                    };
                }
            } catch (err) {
                console.error('Error fetching steps:', err);
            }
        }

        fetchIdentifiers();
    </script>
</body>
</html>
